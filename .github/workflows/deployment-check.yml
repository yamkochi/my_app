- name: Run Diagnostics
  run: |
    # Capture only the status code into the variable
    HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.json "https://yamkochi.com${{ secrets.CRON_SECRET }}")
    
    echo "Server Status Code: $HTTP_STATUS"
    echo "Diagnostics Output:"
    cat response.json
    
    # Directly compare the clean 3-digit code
    if [ "$HTTP_STATUS" -ne 200 ]; then
      echo "❌ Infrastructure diagnostic failure or unauthorized access!"
      exit 1
    fi
    echo "✅ Production services are healthy!"

